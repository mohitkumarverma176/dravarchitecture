<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Drav Architecture">

    <!-- SVG Favicon — no file needed -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23111111'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-size='13' font-weight='700' fill='%23fc5404'%3EDA%3C/text%3E%3C/svg%3E">
    <link rel="shortcut icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23111111'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-size='13' font-weight='700' fill='%23fc5404'%3EDA%3C/text%3E%3C/svg%3E">

    <meta name="description" content="{% block meta_description %}Drav Architecture — Expert Architecture, Landscape Design & Interior Planning across India.{% endblock %}">
    <meta name="keywords" content="{% block meta_keywords %}architecture, landscape design, interior design, engineering plan, India{% endblock %}">

    <!-- Fonts: Cormorant Garamond (display) + Inter (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='fonts/icomoon/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='fonts/flaticon/font/flaticon.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tiny-slider.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/aos.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/glightbox.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/drav-custom.css') }}">

    <title>{% block title %}Drav Architecture{% endblock %} &mdash; Architecture &amp; Landscape Design</title>
</head>
<body>

<!-- Mobile Menu -->
<div class="site-mobile-menu site-navbar-target">
    <div class="site-mobile-menu-header">
        <div class="site-mobile-menu-close">
            <span class="icofont-close js-menu-toggle"></span>
        </div>
    </div>
    <div class="site-mobile-menu-body"></div>
</div>

<!-- Navigation -->
<nav class="site-nav">
    <div class="container">
        <div class="site-navigation">
            <a href="{{ url_for('home') }}" class="logo m-0 float-start">
                Drav Architecture<span class="text-primary">.</span>
            </a>

            <ul class="js-clone-nav d-none d-lg-inline-block text-start site-menu float-start">
                <li class="{% block nav_home %}{% endblock %}"><a href="{{ url_for('home') }}">Home</a></li>
                <li class="has-children {% block nav_projects %}{% endblock %}">
                    <a href="{{ url_for('projects') }}">Projects</a>
                    <ul class="dropdown">
                        <li><a href="{{ url_for('projects') }}">All Projects</a></li>
                        <li><a href="{{ url_for('projects') }}">Landscape Design</a></li>
                        <li><a href="{{ url_for('projects') }}">Architecture</a></li>
                        <li><a href="{{ url_for('projects') }}">Institutional</a></li>
                    </ul>
                </li>
                <li class="{% block nav_services %}{% endblock %}"><a href="{{ url_for('services') }}">Services</a></li>
                <li class="{% block nav_about %}{% endblock %}"><a href="{{ url_for('about') }}">About</a></li>
                <li class="{% block nav_contact %}{% endblock %}"><a href="{{ url_for('contact') }}">Contact</a></li>
            </ul>

            <a href="#" class="burger ml-auto float-end site-menu-toggle light js-menu-toggle d-inline-block d-lg-none"
               data-toggle="collapse" data-target="#main-navbar">
                <span></span>
            </a>
            <ul class="site-menu float-end d-none d-md-block">
                <li>
                    <a href="tel:+918878860664" class="d-flex align-items-center text-white fw-bold" style="font-size:0.85rem; letter-spacing:0.06em;">
                        <span class="icon-phone me-2" style="font-size:1rem;"></span>
                        <span>+91 88788 60664</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Page Content -->
{% block content %}{% endblock %}

<!-- Footer -->
{% include 'footer.html' %}

<!-- Floating WhatsApp CTA -->
<a href="https://wa.me/918878860664" class="floating-cta" target="_blank" rel="noopener" title="Chat on WhatsApp">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="26" height="26">

    </svg>
</a>

<!-- Preloader -->
<div id="overlayer"></div>
<div class="loader">
    <div class="spinner-border" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>

<script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/tiny-slider.js') }}"></script>
<script src="{{ url_for('static', filename='js/aos.js') }}"></script>
<script src="{{ url_for('static', filename='js/glightbox.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/navbar.js') }}"></script>
<script src="{{ url_for('static', filename='js/counter.js') }}"></script>
<script src="{{ url_for('static', filename='js/custom.js') }}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
